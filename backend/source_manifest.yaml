    published_date: "2019-06-09"
    accessed_date: "2026-07-22"
    license:
      name: Creative Commons Attribution 4.0 International
      spdx: CC-BY-4.0
      url: https://creativecommons.org/licenses/by/4.0/
      attribution_required: true
      verification_status: verified
    original_annotations:
      format: COCO instances with segmentation polygons
      class_count: 60
      class_list_reference: author-github/data/annotations.json at the pinned commit
    acquisition:
      method: manual_remote_pinned_author_repository
      access_status: public
      raw_subdirectory: raw/taco/v1.0
      expected_bytes: 2700000000
      repository_url: https://github.com/pedropro/TACO
      repository_tag: "1.0"
      repository_commit: ad8a693f16c0bab2208786c6e97e1075546400d5
      downloader: download.py from the pinned repository commit
      image_delivery: Original Flickr URLs declared in the official annotations
      checksum:
        algorithm: sha256
        scope: author-github/data/annotations.json
        value: ac1ec605c9e1fcda767970de3457c69b4a43b62c02aca8c4c80f51d1b5ae8449
      archival_record:
        archive_name: TACO.zip
        expected_bytes: 2719810615
        checksum:
          algorithm: md5
          value: e9149407d883e21a8d224feef8210920
        used_for_current_raw_acquisition: false
    preprocessing: []
    derived_release_transforms:
      - Apply EXIF orientation only while materializing derived release images; never modify raw files.
    augmentation: []
    mapping_ledger_version: aware-mappings-v3
    inventory_status: raw_files_verified_remote
    counts:
      images: 1500
      annotations: 4784
      source: remote_full_file_audit_2026-07-23
    limitations:
      - Outdoor litter domain differs from close handheld household scans.
      - Several classes are rare and some material distinctions are visually ambiguous.
      - Battery is excluded; TACO provides only two battery boxes.
      - Plastic container is excluded from ontology v3 because its narrow approved mapping provided only 17 accepted boxes.
      - Only the official reviewed annotations are allowed; unofficial weekly annotations are excluded.
      - Current images were acquired from author-declared Flickr URLs rather than the fixed Zenodo archive; exact per-file hashes must be frozen before release.

