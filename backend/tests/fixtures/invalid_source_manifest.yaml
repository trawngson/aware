    include_in_training: true
    include_in_evaluation: true
    owner: unknown
    stable_url: null
    version: unknown
    license:
      name: unknown
      spdx: NOASSERTION
      verification_status: failed
    original_annotations:
      format: unknown
      class_list_reference: unknown
    acquisition:
      method: automatic_download
      raw_subdirectory: ../../unsafe
    preprocessing:
      - resize
    augmentation: []
    mapping_ledger_version: none
    limitations: []
